<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDTools</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="home" aria-label="GDTools main page">
      <button class="credits-button" id="creditsButton" type="button" aria-label="Open credits">
        <img src="main-assets/GT_credits.png" alt="" />
      </button>

      <section class="home-panel">
        <h1>GDTools</h1>

        <nav class="tool-links" aria-label="Tool navigation">
        <a class="tool-link" href="rating/index.html">Rating Generator</a>
        <a class="tool-link" href="runs/index.html">Runs Calculator</a>
        </nav>
      </section>
    </main>

    <div class="credits-modal" id="creditsModal" aria-hidden="true">
      <div class="credits-backdrop" data-close-credits></div>

      <section class="credits-card" role="dialog" aria-modal="true" aria-labelledby="creditsTitle">
        <button class="credits-close" type="button" aria-label="Close credits" data-close-credits>
          <img src="main-assets/GJ_closeBtn_001.png" alt="" />
        </button>

        <button class="credits-arrow credits-arrow-left" id="creditsPrev" type="button" aria-label="Previous credits page">
          <img src="main-assets/GJ_arrow_03_001.png" alt="" />
        </button>

        <div class="credits-page is-active" data-credits-page="0">
          <h2 id="creditsTitle">Creator</h2>
          <p class="credit-name">Scythster</p>
          <a class="youtube-link" href="https://youtube.com/@Scythster" target="_blank" rel="noreferrer" aria-label="Scythster on YouTube">
            <img src="main-assets/gj_ytIcon_001.png" alt="" />
          </a>
        </div>

        <div class="credits-page" data-credits-page="1">
          <h2>Inspo</h2>
          <p class="credit-name">GD Colon</p>
          <p class="credit-role">Most Assets</p>
          <p class="credit-name credit-name-small">RobTop</p>
        </div>

        <button class="credits-arrow credits-arrow-right" id="creditsNext" type="button" aria-label="Next credits page">
          <img src="main-assets/GJ_arrow_03_001.png" alt="" />
        </button>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
