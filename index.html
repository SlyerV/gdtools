<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GD Rating Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Geometry Dash rating generator">
      <img
        class="title"
        src="assets/GT_title.png"
        alt="GD Rating Generator"
      />

      <section class="workspace" aria-label="Icon generator">
        <div class="selector-stack">
          <div class="generator" aria-label="Difficulty face selector">
            <button class="arrow-button" id="previousFace" type="button" aria-label="Previous difficulty face">
              <img src="assets/edit_leftBtn_001.png" alt="" />
            </button>

            <div class="face-stage" aria-live="polite">
              <canvas
                class="preview-canvas"
                id="iconCanvas"
                width="270"
                height="270"
                aria-label="Generated difficulty icon preview"
              ></canvas>
            </div>

            <button class="arrow-button" id="nextFace" type="button" aria-label="Next difficulty face">
              <img src="assets/edit_rightBtn_001.png" alt="" />
            </button>
          </div>

          <div class="rating-buttons" aria-label="Rating selector">
            <button class="rating-button is-selected" type="button" data-rating="blank" aria-label="No rating" aria-pressed="true"></button>
            <button class="rating-button" type="button" data-rating="featured" aria-label="Featured rating" aria-pressed="false">
              <img src="assets/GJ_featuredCoin_001.png" alt="" />
            </button>
            <button class="rating-button" type="button" data-rating="epic" aria-label="Epic rating" aria-pressed="false">
              <img src="assets/GJ_epicCoin_001.png" alt="" />
            </button>
            <button class="rating-button" type="button" data-rating="legendary" aria-label="Legendary rating" aria-pressed="false">
              <img src="assets/GJ_epicCoin2_001.png" alt="" />
            </button>
            <button class="rating-button" type="button" data-rating="mythic" aria-label="Mythic rating" aria-pressed="false">
              <img src="assets/GJ_epicCoin3_001.png" alt="" />
            </button>
          </div>
        </div>

        <div class="action-buttons">
          <button class="reset-button" id="resetCanvas" type="button" aria-label="Reset canvas edits">
            <img src="assets/GJ_getSongInfoBtn_001.png" alt="" />
          </button>

          <button class="download-button" id="downloadIcon" type="button" aria-label="Download generated icon">
            <img src="assets/GJ_download.png" alt="" />
          </button>

          <button class="edit-button" id="editIcon" type="button" aria-label="Open canvas editor" aria-pressed="false">
            <img src="assets/GJ_viewLevelsBtn_001.png" alt="" />
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
